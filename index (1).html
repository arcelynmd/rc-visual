<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetary Age Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #667eea 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
            font-size: 2.8em;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 50px;
            font-size: 1.15em;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .input-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        input[type="number"] {
            padding: 15px 20px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            width: 250px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.95);
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.5);
            background: white;
            transform: translateY(-2px);
        }

        input[type="number"]::placeholder {
            color: #999;
        }

        button {
            padding: 15px 40px;
            font-size: 1em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(-1px);
        }

        .bodies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .body-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(102, 126, 234, 0.1);
        }

        .body-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .body-image {
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: bold;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .body-info {
            padding: 25px;
            background: linear-gradient(135deg, rgba(255,255,255,1) 0%, rgba(245,247,255,1) 100%);
        }

        .body-name {
            font-size: 1.6em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .body-stat {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
            color: #666;
            font-size: 0.95em;
        }

        .body-stat:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-weight: 700;
            color: #444;
            letter-spacing: 0.3px;
        }

        .stat-value {
            color: #667eea;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .bodies-grid {
                grid-template-columns: 1fr;
            }

            input[type="number"] {
                width: 100%;
                max-width: 250px;
            }
        }

        .error-message {
            text-align: center;
            color: #ff6b9d;
            font-size: 1.1em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Planetary Age Calculator</h1>
        <p class="subtitle">Enter your age in Earth years to see how old you are on other planets and Pluto</p>

        <div class="input-section">
            <input type="number" id="earthYears" placeholder="Enter Earth Years" min="0" step="0.1" value="25">
            <button onclick="calculateAges()">Calculate</button>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div class="bodies-grid" id="bodiesGrid">
            <!-- Cards will be generated by JavaScript -->
        </div>
    </div>

    <script>
        const celestialBodies = [
            {
                name: 'Mercury',
                orbitalPeriod: 0.2408,
                distanceFromSun: '57.9 million km',
                image: 'https://images-assets.nasa.gov/image/PIA14329/PIA14329~orig.jpg',
                fallbackColor: 'linear-gradient(135deg, #8B7355 0%, #C0C0C0 100%)'
            },
            {
                name: 'Venus',
                orbitalPeriod: 0.6152,
                distanceFromSun: '108.2 million km',
                image: 'https://images-assets.nasa.gov/image/PIA00104/PIA00104~orig.jpg',
                fallbackColor: 'linear-gradient(135deg, #FFA500 0%, #FF8C00 100%)'
            },
            {
                name: 'Earth',
                orbitalPeriod: 1.0,
                distanceFromSun: '149.6 million km',
                image: 'https://images-assets.nasa.gov/image/GSFC_20171208_Archive_e002151~orig.jpg',
                fallbackColor: 'linear-gradient(135deg, #4169E1 0%, #32CD32 100%)'
            },
            {
                name: 'Mars',
                orbitalPeriod: 1.8808,
                distanceFromSun: '227.9 million km',
                image: 'https://images-assets.nasa.gov/image/PIA16720/PIA16720~orig.jpg',
                fallbackColor: 'linear-gradient(135deg, #CD5C5C 0%, #FF4500 100%)'
            },
            {
                name: 'Jupiter',
                orbitalPeriod: 11.862,
                distanceFromSun: '778.5 million km',
                image: 'https://images-assets.nasa.gov/image/PIA01618/PIA01618~orig.jpg',
                fallbackColor: 'linear-gradient(135deg, #DAA520 0%, #B8860B 100%)'
            },
            {
                name: 'Saturn',
                orbitalPeriod: 29.457,
                distanceFromSun: '1.43 billion km',
                image: 'https://images-assets.nasa.gov/image/PIA11667/PIA11667~orig.jpg',
                fallbackColor: 'linear-gradient(135deg, #F4A460 0%, #DEB887 100%)'
            },
            {
                name: 'Uranus',
                orbitalPeriod: 84.017,
                distanceFromSun: '2.87 billion km',
                image: 'https://images-assets.nasa.gov/image/PIA01392/PIA01392~orig.jpg',
                fallbackColor: 'linear-gradient(135deg, #4FD0E7 0%, #00CED1 100%)'
            },
            {
                name: 'Neptune',
                orbitalPeriod: 164.791,
                distanceFromSun: '4.50 billion km',
                image: 'https://images-assets.nasa.gov/image/PIA01492/PIA01492~orig.jpg',
                fallbackColor: 'linear-gradient(135deg, #4169E1 0%, #00008B 100%)'
            },
            {
                name: 'Pluto',
                orbitalPeriod: 247.94,
                distanceFromSun: '5.91 billion km',
                image: 'https://images-assets.nasa.gov/image/PIA19873/PIA19873~orig.jpg',
                fallbackColor: 'linear-gradient(135deg, #A9A9A9 0%, #696969 100%)'
            }
        ];

        function calculateAges() {
            const input = document.getElementById('earthYears');
            const errorMessage = document.getElementById('errorMessage');
            const earthYears = parseFloat(input.value);

            // Validation
            if (isNaN(earthYears) || earthYears < 0) {
                errorMessage.textContent = 'Please enter a valid positive number';
                return;
            }

            errorMessage.textContent = '';

            const bodiesGrid = document.getElementById('bodiesGrid');
            bodiesGrid.innerHTML = '';

            celestialBodies.forEach(body => {
                const card = document.createElement('div');
                card.className = 'body-card';

                const age = (earthYears / body.orbitalPeriod).toFixed(2);
                const revolutions = (earthYears / body.orbitalPeriod).toFixed(2);

                const imageDiv = document.createElement('div');
                imageDiv.className = 'body-image';
                imageDiv.style.backgroundImage = `url('${body.image}')`;
                imageDiv.style.backgroundSize = 'cover';
                imageDiv.style.backgroundPosition = 'center';
                imageDiv.setAttribute('data-fallback', body.fallbackColor);

                // Load image and handle errors
                const img = new Image();
                img.onload = function() {
                    imageDiv.style.backgroundImage = `url('${body.image}')`;
                };
                img.onerror = function() {
                    imageDiv.style.background = body.fallbackColor;
                    imageDiv.style.display = 'flex';
                    imageDiv.style.alignItems = 'center';
                    imageDiv.style.justifyContent = 'center';
                    imageDiv.innerHTML = `<span style="font-size: 60px; text-shadow: 0 2px 10px rgba(0,0,0,0.3);">${body.name.substring(0, 1)}</span>`;
                };
                img.src = body.image;

                card.appendChild(imageDiv);

                const infoDiv = document.createElement('div');
                infoDiv.className = 'body-info';
                infoDiv.innerHTML = `
                    <div class="body-name">${body.name}</div>
                    <div class="body-stat">
                        <span class="stat-label">Age:</span>
                        <span class="stat-value">${age} years</span>
                    </div>
                    <div class="body-stat">
                        <span class="stat-label">Revolutions:</span>
                        <span class="stat-value">${revolutions}</span>
                    </div>
                    <div class="body-stat">
                        <span class="stat-label">Orbit Time:</span>
                        <span class="stat-value">${body.orbitalPeriod.toFixed(6)} Earth years</span>
                    </div>
                    <div class="body-stat">
                        <span class="stat-label">Distance:</span>
                        <span class="stat-value">${body.distanceFromSun}</span>
                    </div>
                `;

                card.appendChild(infoDiv);
                bodiesGrid.appendChild(card);
            });
        }

        // Calculate on page load with default value
        window.addEventListener('load', calculateAges);

        // Allow Enter key to calculate
        document.getElementById('earthYears').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculateAges();
            }
        });
    </script>
</body>
</html>
