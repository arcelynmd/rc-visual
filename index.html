<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetary Age Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .input-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        input[type="number"] {
            padding: 15px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            width: 250px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        input[type="number"]:focus {
            outline: none;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.4);
        }

        button {
            padding: 15px 40px;
            font-size: 1em;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background-color: #ff5252;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .bodies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .body-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .body-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        .body-image {
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: bold;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .body-info {
            padding: 20px;
        }

        .body-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .body-stat {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            color: #666;
            font-size: 0.95em;
        }

        .body-stat:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-weight: 600;
            color: #333;
        }

        .stat-value {
            color: #ff6b6b;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .bodies-grid {
                grid-template-columns: 1fr;
            }

            input[type="number"] {
                width: 100%;
                max-width: 250px;
            }
        }

        .error-message {
            text-align: center;
            color: #ff6b6b;
            font-size: 1.1em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Planetary Age Calculator</h1>
        <p class="subtitle">Enter your age in Earth years to see how old you are on other planets and Pluto</p>

        <div class="input-section">
            <input type="number" id="earthYears" placeholder="Enter Earth Years" min="0" step="0.1" value="25">
            <button onclick="calculateAges()">Calculate</button>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div class="bodies-grid" id="bodiesGrid">
            <!-- Cards will be generated by JavaScript -->
        </div>
    </div>

    <script>
        const celestialBodies = [
            {
                name: 'Mercury',
                orbitalPeriod: 0.2408,
                distanceFromSun: '57.9 million km',
                image: 'https://upload.wikimedia.org/wikipedia/commons/0/02/Mercury_in_color_-_Prockter07_centered.jpg'
            },
            {
                name: 'Venus',
                orbitalPeriod: 0.6152,
                distanceFromSun: '108.2 million km',
                image: 'https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg'
            },
            {
                name: 'Earth',
                orbitalPeriod: 1.0,
                distanceFromSun: '149.6 million km',
                image: 'https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg'
            },
            {
                name: 'Mars',
                orbitalPeriod: 1.8808,
                distanceFromSun: '227.9 million km',
                image: 'https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg'
            },
            {
                name: 'Jupiter',
                orbitalPeriod: 11.862,
                distanceFromSun: '778.5 million km',
                image: 'https://upload.wikimedia.org/wikipedia/commons/e/e1/Jupiter.jpg'
            },
            {
                name: 'Saturn',
                orbitalPeriod: 29.457,
                distanceFromSun: '1.43 billion km',
                image: 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg'
            },
            {
                name: 'Uranus',
                orbitalPeriod: 84.017,
                distanceFromSun: '2.87 billion km',
                image: 'https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg'
            },
            {
                name: 'Neptune',
                orbitalPeriod: 164.791,
                distanceFromSun: '4.50 billion km',
                image: 'https://upload.wikimedia.org/wikipedia/commons/6/63/Neptune_-_Voyager_2_%2829033446845%29_flatten_cleaned.jpg'
            },
            {
                name: 'Pluto',
                orbitalPeriod: 247.94,
                distanceFromSun: '5.91 billion km',
                image: 'https://upload.wikimedia.org/wikipedia/commons/e/ef/Pluto_in_True_Color_2x_JPEG_348.jpg'
            }
        ];

        function calculateAges() {
            const input = document.getElementById('earthYears');
            const errorMessage = document.getElementById('errorMessage');
            const earthYears = parseFloat(input.value);

            // Validation
            if (isNaN(earthYears) || earthYears < 0) {
                errorMessage.textContent = 'Please enter a valid positive number';
                return;
            }

            errorMessage.textContent = '';

            const bodiesGrid = document.getElementById('bodiesGrid');
            bodiesGrid.innerHTML = '';

            celestialBodies.forEach(body => {
                const card = document.createElement('div');
                card.className = 'body-card';

                const age = (earthYears / body.orbitalPeriod).toFixed(2);
                const revolutions = (earthYears / body.orbitalPeriod).toFixed(2);

                card.innerHTML = `
                    <div class="body-image" style="background-image: url('${body.image}');">
                    </div>
                    <div class="body-info">
                        <div class="body-name">${body.name}</div>
                        <div class="body-stat">
                            <span class="stat-label">Age:</span>
                            <span class="stat-value">${age} years</span>
                        </div>
                        <div class="body-stat">
                            <span class="stat-label">Revolutions:</span>
                            <span class="stat-value">${revolutions}</span>
                        </div>
                        <div class="body-stat">
                            <span class="stat-label">Orbit Time:</span>
                            <span class="stat-value">${body.orbitalPeriod.toFixed(6)} Earth years</span>
                        </div>
                        <div class="body-stat">
                            <span class="stat-label">Distance:</span>
                            <span class="stat-value">${body.distanceFromSun}</span>
                        </div>
                    </div>
                `;

                bodiesGrid.appendChild(card);
            });
        }

        // Calculate on page load with default value
        window.addEventListener('load', calculateAges);

        // Allow Enter key to calculate
        document.getElementById('earthYears').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculateAges();
            }
        });
    </script>
</body>
</html>
